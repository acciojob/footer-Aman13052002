<!DOCTYPE html>
<html>
<head>
  <title>Company Footer</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    footer {
      background-color: #222;
      color: #fff;
      padding: 30px 20px;
    }

    .footer-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 20px;
    }

    .footer-section {
      flex: 1 1 200px;
    }

    .footer-section h3 {
      margin-bottom: 10px;
    }

    .footer-section a {
      display: block;
      color: #ccc;
      text-decoration: none;
      margin-bottom: 5px;
    }

    .footer-section a:hover {
      color: #fff;
    }

    /* Social Icons */
    .media-icons {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .media-icons div {
      width: 35px;
      height: 35px;
      background-color: #444;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      cursor: pointer;
    }

    .media-icons div:hover {
      background-color: #666;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .footer-container {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

<footer>
  <div class="footer-container">

    <!-- Home -->
    <div class="footer-section">
      <h3>Home</h3>
      <a href="#">Homepage</a>
    </div>

    <!-- About -->
    <div class="footer-section">
      <h3>About</h3>
      <a href="#">Our Story</a>
      <a href="#">Team</a>
    </div>

    <!-- Links -->
    <div class="footer-section">
      <h3>Links</h3>
      <a href="#">Blog</a>
      <a href="#">Careers</a>
      <a href="#">Support</a>
    </div>

    <!-- Services -->
    <div class="footer-section">
      <h3>Services</h3>
      <a href="#">Web Development</a>
      <a href="#">App Development</a>
      <a href="#">SEO</a>
    </div>

    <!-- Contact -->
    <div class="footer-section">
      <h3>Contact</h3>
      <p>8879887262</p>
      <a href="#">Social Media Page</a>

      <!-- Media Icons -->
      <div class="media-icons">
        <div>F</div>
        <div>T</div>
        <div>I</div>
        <div>L</div>
        <div>Y</div>
      </div>
    </div>

  </div>
</footer>

</body>
</html>
